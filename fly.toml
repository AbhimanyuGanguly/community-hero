# fly.toml app configuration file generated for community-hero

app = "community-hero"
primary_region = "otp" # User can change this to their preferred region during `fly launch`

[build]
  # Uses the Dockerfile in the project root
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "community_hero_data"
  destination = "/usr/src/app/server/data"

[env]
  PORT = "3000"
  JWT_SECRET = "community_hero_secret_key_2024_super_secure"
