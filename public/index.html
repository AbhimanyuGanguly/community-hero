<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Hero — Hyperlocal Problem Solver</title>
  <meta name="description" content="Report, track, and resolve community issues like potholes, water leakages, and broken streetlights. AI-powered platform for transparent civic engagement in Delhi NCR.">
  <meta name="keywords" content="community, issue reporting, pothole, civic engagement, Delhi NCR, AI, hyperlocal">
  <meta property="og:title" content="Community Hero — Hyperlocal Problem Solver">
  <meta property="og:description" content="Be the hero your community needs. Report and resolve local issues through collaboration and AI.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
      <div class="navbar-inner">
        <a href="#home" class="navbar-brand">
          <div class="navbar-brand-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px; height:18px; color:white;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <span class="navbar-brand-text">Community<strong>Hero</strong></span>
        </a>

        <div class="navbar-links" id="navbar-links">
          <a href="#home" class="navbar-link active" data-page="home">Home</a>
          <a href="#map" class="navbar-link" data-page="map">Map</a>
          <a href="#tracker" class="navbar-link" data-page="tracker">Tracker</a>
          <a href="#dashboard" class="navbar-link" data-page="dashboard">Dashboard</a>
          <a href="#leaderboard" class="navbar-link" data-page="leaderboard">Leaderboard</a>
        </div>

        <div class="navbar-actions" id="navbar-actions">
          <a href="#login" class="navbar-action-outline">
            Report Issue
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 1l4 4-4 4"/></svg>
          </a>
        </div>

        <button class="navbar-mobile-toggle" id="mobile-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div class="page-loader"><div class="spinner"></div></div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="app-footer">
      <div class="container">
        <div class="footer-content">
          <span>© 2025 Community Hero. Built for a better tomorrow.</span>
          <div class="footer-links">
            <a href="#home">Home</a>
            <a href="#map">Map</a>
            <a href="#dashboard">Dashboard</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Leaflet MarkerCluster -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- App JS (order matters) -->
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/report.js"></script>
  <script src="/js/pages/map.js"></script>
  <script src="/js/pages/tracker.js"></script>
  <script src="/js/pages/issueDetail.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/leaderboard.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
